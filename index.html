<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Operations Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a; /* bg-slate-900 */
      color: #e2e8f0; /* text-slate-200 */
    }
    /* Custom scrollbar for consistent look */
    .custom-scrollbar::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #1e293b; /* bg-slate-800 */
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569; /* bg-slate-600 */
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #64748b; /* bg-slate-500 */
    }
    /* Basic button styling to be extended by Tailwind */
    .btn {
      @apply px-6 py-3 font-semibold rounded-lg shadow-md transition-all duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900;
    }
    .btn-primary {
      @apply bg-sky-500 hover:bg-sky-600 text-white focus:ring-sky-400;
    }
    .btn-secondary {
      @apply bg-yellow-500 hover:bg-yellow-600 text-slate-900 focus:ring-yellow-400;
    }
    .btn-ghost {
      @apply bg-transparent hover:bg-slate-700 text-sky-400 focus:ring-sky-500;
    }
    .card {
      @apply bg-slate-800 rounded-xl shadow-2xl p-6 transition-all duration-300;
    }
    .input-field {
      @apply w-full p-3 bg-slate-700 border border-slate-600 rounded-md focus:ring-2 focus:ring-sky-500 focus:border-sky-500 placeholder-slate-400;
    }

    /* Fix for light inputs having light text */
    .input-field.bg-slate-100 {
        color: #0f172a; /* text-slate-900 */
    }

    /* Animated gradient for headers or special sections */
    .animated-gradient-text {
      background-image: linear-gradient(90deg, #38bdf8, #fbbf24, #ec4899, #38bdf8);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradient-animation 4s linear infinite;
    }

    @keyframes gradient-animation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Shiny text effect */
    .shiny-text {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .shiny-text::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 150%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent 30%,
        rgba(255, 255, 255, 0.4), /* slightly less intense shine */
        transparent 70%
      );
      transform: skewX(-25deg);
      animation: shiny-animation 5s infinite;
    }

    @keyframes shiny-animation {
      0% {
        left: -150%;
      }
      70% { /* let it travel across */
        left: 150%;
      }
      100% { /* hold at the end before repeating */
        left: 150%;
      }
    }
    
    /* Shake animation for incorrect feedback */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .animate-shake {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.4.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.417.0",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.1",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0"
  }
}
</script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div id="root" class="w-full h-full max-w-5xl mx-auto"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
